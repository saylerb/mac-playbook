---

# Check that github fingerprint is still the same
# https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/githubs-ssh-key-fingerprints
# ssh-keyscan -t rsa github.com | tee github-key-temp | ssh-keygen -lf -

- name: get GitHub SSH key
  ansible.builtin.command: ssh-keyscan github.com
  register: github_key

- name: Add GitHub SSH key to known hosts
  ansible.builtin.known_hosts:
    name: github.com
    key: "{{ github_key.stdout }}"
    path: "~/.ssh/known_hosts"

- name: define source and dest
  set_fact:
    dotfiles_to_link:
      - { source: '~/dotfiles/starship.toml', dest: '~/.config/starship.toml' }
      - { source: '~/dotfiles/.vimrc', dest: '~/.config/vim/vimrc' }
      - { source: '~/dotfiles/.tmux.conf', dest: '~/.config/tmux/tmux.conf' }
      - { source: '~/dotfiles/.gitconfig', dest: '~/.config/git/config' }
      - { source: '~/dotfiles/.bash_profile', dest: '~/.bash_profile' }
      - { source: '~/dotfiles/.zshrc', dest: '~/.zshrc' }
  tags:
    - links

- name: clone down dotfiles from github
  git:
    repo: git@github.com:saylerb/dotfiles.git
    dest: ~/dotfiles
    key_file: "{{ github_ssh_key_path }}"
  tags:
    - links

- name: ensure required directories exist
  file:
    path: "{{ item.dest | dirname }}"
    state: directory
  loop:
      "{{ dotfiles_to_link }}"
  tags:
    - links

- name: symlink dotfiles to respective destinations
  file:
    src: "{{ item.source }}"
    dest: "{{ item.dest }}"
    mode: '0644'
    state: link
  loop:
    "{{ dotfiles_to_link }}"
  tags:
    - links

- name: create vscode settings directory if it does not exist
  file:
    path: ~/Library/Application Support/Code/User
    state: directory
  tags:
    - links

- name: remove vscode settings if they exist
  file:
    path: ~/Library/Application Support/Code/User/{{ item }}
    state: absent
  with_items:
    - settings.json
    - keybindings.json
  tags:
    - links

- name: symlink vscode configuration files
  file:
    src: ~/dotfiles/vscode/{{ item }}
    dest: ~/Library/Application Support/Code/User/{{ item }}
    mode: 0644
    state: link
  with_items:
    - settings.json
    - keybindings.json
  tags:
    - links

- name: download vundle
  git:
    repo: https://github.com/VundleVim/Vundle.vim.git
    dest: ~/.vim/bundle/Vundle.vim

- name: install plugins
  shell: vim -E -s -c "source ~/.vimrc" -c PluginInstall -c qa
  ignore_errors: yes

- name: Run PluginClean
  shell: vim '+PluginClean!' +qall

- name: download patched powerline fonts
  git:
    repo: https://github.com/powerline/fonts.git
    depth: 1
    dest: ~/fonts
  register: fonts_download
  tags:
    - fonts

- name: check if fonts are already installed
  find:
    paths: ~/Library/Fonts
    patterns: "*.ttf"
  register: font_files
  tags:
    - fonts

- name: install the fonts
  command: ./install.sh
  args:
    chdir: ~/fonts
  when:
    - font_files.matched|int == 0
    - fonts_download is succeeded
  tags:
    - fonts

- name: download iterm2 color profile
  get_url:
    url: https://raw.githubusercontent.com/morhetz/gruvbox-contrib/master/iterm2/gruvbox-dark.itermcolors
    dest: ~/Downloads/
  tags:
    - fonts
